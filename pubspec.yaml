name: cammy_workspace
description: "An open-source camera interface application."
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ^3.12.0

# Bind apps and packages under a single Dart workspace
workspace:
  - apps/windows
  - apps/linux
  - packages/cammy_core
  - ui_packages/cammy_ui

melos:
  packages:
    - apps/**
    - packages/**
    - ui_packages/**

  scripts:
    workspace-bootstrap:
      run: melos bootstrap
      description: "Initialize and link all workspace packages"

    build-runner:
      run: dart run build_runner build --delete-conflicting-outputs
      description: "Run build_runner across all packages for code generation"
      exec:
        concurrency: 1

dev_dependencies:
  melos: ^7.7.0